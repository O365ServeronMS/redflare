name = "phim"
compatibility_date = "2024-03-20"

# Static-assets-only deployment — no Worker. All catalog data (home/list/genre/
# country/detail) is served by the VPS catalog-api at img.bluesia.net/api/*.
# The asset layer serves the SPA shell and falls back to index.html for client
# routes, so phim.bluesia.net never invokes a Worker.
[assets]
directory = "dist"
not_found_handling = "single-page-application"
